<header class="bg-white shadow">
  <div class="container mx-auto px-4 py-6 flex items-center justify-between">
    <a routerLink="/" class="text-3xl font-bold text-blue-600">BookMonkey</a>
    <nav>
      <a routerLink="/reading-list"
         class="relative inline-flex items-center gap-2 text-gray-700 hover:text-blue-600 font-medium transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
        Reading List
        <span *ngIf="readingListCount() > 0"
              class="absolute -top-2 -right-4 bg-pink-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">
          {{ readingListCount() }}
        </span>
      </a>
    </nav>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="bg-gray-100 mt-12">
  <div class="container mx-auto px-4 py-6">
    <p class="text-center text-gray-600 text-sm">© 2023 BookMonkey App - Angular Workshop by workshops.de</p>
  </div>
</footer>
